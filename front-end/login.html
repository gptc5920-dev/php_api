<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-right"></div>

  <header class="topbar">
    <a class="brand" href="./index.html">Clean API</a>
    <nav>
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html" class="active">Login</a>
      <a href="./dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main>
    <section class="panel reveal">
      <div class="section-head">
        <p class="label">Auth</p>
        <h2>Sign In</h2>
        <p class="summary small">Authenticate with email and password using your live login endpoint.</p>
      </div>
      <form id="loginForm" class="card single-col">
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button class="btn primary" type="submit">Login</button>
        <pre class="result" id="loginResult"></pre>
      </form>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
