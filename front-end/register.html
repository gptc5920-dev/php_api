<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-left"></div>

  <header class="topbar">
    <a class="brand" href="./index.html">Clean API</a>
    <nav>
      <a href="./index.html">Home</a>
      <a href="./register.html" class="active">Register</a>
      <a href="./login.html">Login</a>
      <a href="./dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main>
    <section class="panel reveal">
      <div class="section-head">
        <p class="label">Auth</p>
        <h2>Create Account</h2>
        <p class="summary small">Create a new user account in the system and receive the API response instantly.</p>
      </div>
      <form id="registerForm" class="card single-col">
        <input name="name" placeholder="Name" required />
        <input name="email" type="email" placeholder="Email" required />
        <select name="role">
          <option value="staff">staff</option>
          <option value="admin">admin</option>
        </select>
        <input name="password" type="password" placeholder="Password" required />
        <input name="confirm_password" type="password" placeholder="Confirm password" />
        <button class="btn primary" type="submit">Register</button>
        <pre class="result" id="registerResult"></pre>
      </form>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
